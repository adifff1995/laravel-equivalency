[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.bcmath", "php82Extensions.ctype", "nodejs_20", "npm"]

[phases.install]
cmds = [
    "curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer",
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
